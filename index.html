<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Salary Portal</title>
<link rel="stylesheet" href="Style.css">
    </head>
<body>

<div class="container">
    <h2>Technician Salary Slip Portal</h2>
    <p>Enter your ID and Date of Birth to view your Salary Slip.</p>
    
    <!-- Input Elements -->
    <div class="input-group">
        <label for="empId">Employee ID</label>
        <input type="text" id="empId" placeholder="C62921" autocomplete="off">
    </div>
    
    <div class="input-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob">
    </div>
    
    <button onclick="verifyAndSearch()">Search Slip</button>
    
    <!-- Dynamic Feedback Area -->
    <div id="message"></div>

    <!-- Hidden Display Module uncovered upon validation success -->
    <div class="preview-section" id="previewSection">
        <h3 style="color: #333; font-size: 16px; margin-bottom: 10px;">Payslip Preview</h3>
        
        <!-- Document Viewing Canvas -->
        <iframe class="pdf-viewer" id="pdfFrame" src=""></iframe>
        
        <button class="download-btn" onclick="downloadPayslip()">Download Salary Slip</button>
    </div>
</div>
<script src="SlipJS.js"></script>
</body>
</html>
